services:
  app:
    image: ${ECR_IMAGE}
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_URL=${CLIENT_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_NAME=english_learning_platform
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_GENERATIVE_AI_KEY=${GOOGLE_GENERATIVE_AI_KEY}
    restart: unless-stopped
