services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - GOOGLE_GENERATIVE_AI_KEY=${GOOGLE_GENERATIVE_AI_KEY:-}
    volumes:
      - ./database:/app/database
    restart: unless-stopped
