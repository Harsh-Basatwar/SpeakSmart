version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: speaksmart
    AWS_DEFAULT_REGION: us-east-1
  parameter-store:
    REACT_APP_API_URL: /speaksmart/REACT_APP_API_URL

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - export IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:-latest}

  build:
    commands:
      - echo Building Docker image $IMAGE_URI:$IMAGE_TAG ...
      - docker build --build-arg REACT_APP_API_URL=$REACT_APP_API_URL -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest .

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $IMAGE_URI:$IMAGE_TAG
      - docker push $IMAGE_URI:latest
      - echo Updating docker-compose with new image...
      - |
        sed -i "s|image: .*|image: $IMAGE_URI:$IMAGE_TAG|" docker-compose.yml

artifacts:
  files:
    - appspec.yml
    - docker-compose.yml
    - scripts/**/*
  discard-paths: no